<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('scale-95');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('scale-95');
            });
        });

        // Add an atmospheric hover effect to the profile card
        const profileCard = document.querySelector('section');
        profileCard.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = profileCard.getBoundingClientRect();
            const x = (e.clientX - left) / width;
            const y = (e.clientY - top) / height;
            
            profileCard.style.setProperty('--mouse-x', x);
            profileCard.style.setProperty('--mouse-y', y);
        });
    </script>
