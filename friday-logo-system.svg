<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FRIDAY Logo System</title>
  <desc>Complete logo system for FRIDAY — Financial Resource &amp; Investment Decision AI for You</desc>

  <!-- Background -->
  <rect width="680" height="520" fill="#FFFFFF"/>

  <!-- ── Section labels ── -->
  <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Primary — dark</text>
  <text x="340" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Primary — light</text>
  <text x="530" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Icon only</text>

  <!-- ══ VARIANT 1 — Dark ══ -->
  <rect x="20" y="44" width="160" height="160" rx="20" fill="#0B0F1A"/>
  <rect x="56" y="72" width="88" height="88" rx="14" fill="#1A56F5"/>
  <path d="M108 82 L88 116 H102 L92 142 L122 104 H107 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <text x="100" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="6">FRIDAY</text>
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="400" fill="#8B93A8" letter-spacing="1.2">FINANCIAL RESOURCE &amp; INVESTMENT DECISION AI FOR YOU</text>

  <!-- ══ VARIANT 2 — Light ══ -->
  <rect x="240" y="44" width="200" height="160" rx="20" fill="#F4F5F9" stroke="#E2E4EB" stroke-width="1"/>
  <rect x="282" y="68" width="116" height="76" rx="14" fill="#0B0F1A"/>
  <path d="M348 76 L328 106 H342 L332 128 L364 92 H348 Z" fill="#1A56F5" fill-rule="evenodd"/>
  <text x="340" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0B0F1A" letter-spacing="6">FRIDAY</text>
  <text x="340" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="400" fill="#8B93A8" letter-spacing="1">FINANCIAL RESOURCE &amp; INVESTMENT DECISION AI FOR YOU</text>

  <!-- ══ VARIANT 3 — Icon sizes ══ -->
  <!-- 64px -->
  <rect x="468" y="64" width="88" height="88" rx="14" fill="#0B0F1A"/>
  <rect x="482" y="76" width="60" height="60" rx="10" fill="#1A56F5"/>
  <path d="M524 84 L510 108 H520 L513 124 L536 98 H525 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <!-- 40px -->
  <rect x="568" y="82" width="52" height="52" rx="10" fill="#0B0F1A"/>
  <rect x="577" y="90" width="34" height="34" rx="6" fill="#1A56F5"/>
  <path d="M600 96 L590 111 H597 L592 122 L608 106 H601 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <!-- 24px -->
  <rect x="630" y="100" width="34" height="34" rx="7" fill="#0B0F1A"/>
  <rect x="636" y="106" width="22" height="22" rx="4" fill="#1A56F5"/>
  <path d="M651 109 L644 119 H649 L646 126 L655 115 H650 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <!-- size labels -->
  <text x="512" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">64px</text>
  <text x="594" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">40px</text>
  <text x="647" y="144" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">24px</text>

  <!-- ══ VARIANT 4 — Horizontal lockup dark ══ -->
  <text x="340" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Horizontal lockup — for app headers &amp; nav bars</text>
  <rect x="60" y="245" width="560" height="90" rx="16" fill="#0B0F1A"/>
  <rect x="84" y="264" width="52" height="52" rx="10" fill="#1A56F5"/>
  <path d="M122 272 L108 294 H118 L111 310 L130 288 H119 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <text x="152" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="7">FRIDAY</text>
  <line x1="370" y1="268" x2="370" y2="322" stroke="#2A3050" stroke-width="1"/>
  <text x="386" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8" letter-spacing="0.5">Your AI finance manager</text>
  <text x="386" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4A5270" letter-spacing="1">FINANCIAL RESOURCE &amp; INVESTMENT DECISION AI FOR YOU</text>

  <!-- ══ VARIANT 5 — Monochrome blue ══ -->
  <text x="340" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Monochrome — for stamps, watermarks, single-color print</text>
  <rect x="60" y="378" width="560" height="90" rx="16" fill="#1A56F5"/>
  <rect x="84" y="397" width="52" height="52" rx="10" fill="#FFFFFF" fill-opacity="0.15"/>
  <rect x="88" y="401" width="44" height="44" rx="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M122 409 L108 431 H118 L111 447 L130 425 H119 Z" fill="#FFFFFF" fill-rule="evenodd"/>
  <text x="152" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="7">FRIDAY</text>
  <line x1="370" y1="400" x2="370" y2="458" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="386" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.8" letter-spacing="0.5">Your AI finance manager</text>
  <text x="386" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="1">FINANCIAL RESOURCE &amp; INVESTMENT DECISION AI FOR YOU</text>

  <!-- ══ Brand colour strip ══ -->
  <text x="340" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B93A8">Brand colours</text>
  <rect x="60"  y="500" width="110" height="16" rx="4" fill="#0B0F1A"/>
  <rect x="178" y="500" width="110" height="16" rx="4" fill="#1A56F5"/>
  <rect x="296" y="500" width="110" height="16" rx="4" fill="#22C55E"/>
  <rect x="414" y="500" width="110" height="16" rx="4" fill="#F4F5F9" stroke="#E2E4EB" stroke-width="0.5"/>
  <text x="115" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8B93A8">#0B0F1A  Navy</text>
  <text x="233" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8B93A8">#1A56F5  Blue</text>
  <text x="351" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8B93A8">#22C55E  Green</text>
  <text x="469" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8B93A8">#F4F5F9  Surface</text>
</svg>
